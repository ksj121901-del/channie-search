* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;

}

body {
    min-height: 100vh;
    background: linear-gradient(180deg, #fffdf2 0%, #fff8d6 50%, #fff2b8 100%);
    padding: 20px;
}

.container {
    max-width: 600px;
    margin: auto;
}

.top-bar {
    height: 80px;
    background: linear-gradient(135deg, #FEE500, #fff08d);
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 700;
    color: #234;
    margin-bottom: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,.12);
}

.search-box {
    margin-bottom: 20px;
}

.search-box input {
    width: 100%;
    height: 65px;
    border: none;
    outline: none;
    border-radius: 999px;
    padding: 0 25px;
    font-size: 22px;
    background: white;
    box-shadow: 0 8px 20px rgba(0,0,0,.08);
}

.search-box input::placeholder {
    color: #7ec4d8;
}

.header {
    display: grid;
    grid-template-columns: 80px 1fr 100px;
    margin-bottom: 10px;
    padding: 0 15px;
    color: #0086aa;
    font-size: 18px;
    font-weight: 700;
}
.header .text-right {
    text-align: right;
}

.list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding-bottom: 50px;
}

.card {
    display: grid;
    grid-template-columns: 80px 1fr 100px;
    align-items: center;
    background: rgba(255,255,255,.9);
    backdrop-filter: blur(10px);
    min-height: 85px;
    border-radius: 28px;
    padding: 0 18px;
    box-shadow: 0 8px 20px rgba(0,0,0,.08);
    transition: .25s;
}

.number {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background: linear-gradient(135deg, #fee500, #fff4a3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: #5a4a00;
    box-shadow: 0 4px 10px rgba(0,0,0,.1);
}

.name {
    font-size: 24px;
    font-weight: 700;
    color: #28536b;
}

.like-box {
    text-align: right;
}

.like-btn {
    background: #f0f0f0;
    border: none;
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    color: #555;
    transition: 0.2s;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.like-btn.liked {
    background: #FFDE4D;
    color: #333;
    box-shadow: 0 4px 8px rgba(254,229,0,0.3);
}

.no-result {
    text-align: center;
    background: white;
    border-radius: 25px;
    padding: 30px;
    font-size: 22px;
}

.bubble {
    position: fixed;
    border-radius: 50%;
    background: rgba(255,255,255,.4);
    z-index: -1;
}
.b1 { width: 100px; height: 100px; top: 80px; left: 40px; }
.b2 { width: 70px; height: 70px; right: 30px; top: 200px; }
.b3 { width: 120px; height: 120px; bottom: 100px; left: 10%; }
</style>

const list = document.getElementById("list");
const search = document.getElementById("search");
let globalLikes = {}; 

function getMyClickStatus(songName) {
    const clicks = JSON.parse(localStorage.getItem("my_clicks") || "{}");
    return !!clicks[songName];
}

async function loadLikesFromServer() {
    try {
        const response = await fetch(BASE_URL);
        globalLikes = await response.json();
        render(search.value);
    } catch (e) {
        console.error("데이터 로드 실패:", e);
        list.innerHTML = `<div class="no-result">❌ 데이터를 불러오지 못했습니다. 구글 앱스 스크립트에서 배포 시 '액세스할 수 있는 사용자'를 '모든 사용자(Anyone)'로 하셨는지 확인하세요.</div>`;
    }
}

function render(keyword=""){
    const filtered = sigList.filter(item =>
        item.name.toLowerCase().includes(keyword.toLowerCase())
    );

    if(filtered.length === 0){
        list.innerHTML = `<div class="no-result">🐠 검색 결과가 없어요!</div>`;
        return;
    }

    list.innerHTML = filtered.map(item => {
        const serverCount = globalLikes[item.name] || 0;
        const isClicked = getMyClickStatus(item.name);
        const heartIcon = isClicked ? "💛" : "🤍";
        const btnClass = isClicked ? "like-btn liked" : "like-btn";
        
        return `
            <div class="card">
                <div class="number">${item.id}</div>
                <div class="name">${item.name}</div>
                <div class="like-box">
                    <button class="${btnClass}" onclick="toggleLike(${item.id}, '${item.name}')">
                        ${heartIcon} ${serverCount}
                    </button>
                </div>
            </div>
        `;
    }).join('');
}

search.addEventListener('input',(e)=>{
    render(e.target.value);
});

async function toggleLike(id, songName){
    const clicks = JSON.parse(localStorage.getItem("my_clicks") || "{}");
    const isClicked = !!clicks[songName];
    const type = isClicked ? "down" : "up";

    if (!globalLikes[songName]) globalLikes[songName] = 0;
    globalLikes[songName] = type === "up" ? globalLikes[songName] + 1 : Math.max(0, globalLikes[songName] - 1);
    clicks[songName] = !isClicked;
    localStorage.setItem("my_clicks", JSON.stringify(clicks));
    render(search.value);

    try {
        await fetch(BASE_URL, {
            method: "POST",
            body: JSON.stringify({ id: id, songName: songName, type: type })
        });
    } catch(e) {
        console.error("서버 전송 실패:", e);
    }
}
